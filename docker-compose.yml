services:
  speak_postgres_db:
    image: postgres:17
    container_name: postgres_speak_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_speak_db
    volumes:
      - speak_postgres_data:/var/lib/postgresql/data
volumes:
    speak_postgres_data: